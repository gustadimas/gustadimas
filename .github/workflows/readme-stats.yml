name: Generate README cards

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=gustadimas&show_icons=true&hide=issues&bg_color=000000&title_color=8A2BE2&text_color=FFFFFF&icon_color=8A2BE2&border_color=8A2BE2&border_radius=6
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download top languages card
        run: |
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=gustadimas&layout=compact&langs_count=6&hide=html,scss,less&theme=dark&bg_color=000000&title_color=8A2BE2&text_color=C9A0DC&border_color=8A2BE2&border_radius=6" -o profile/top-langs.svg

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
